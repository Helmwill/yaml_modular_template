# ============================================================================
# Security Scanning Job Template (Trivy)
# ============================================================================
# Purpose: Executes parallel Trivy security scans on source code
#          Detects secrets, vulnerabilities, and misconfigurations
#
# Scan Types:
#   1. Secret scanning (fs --scanners secret)
#   2. Config/SAST scanning (config --scanners misconfig)
#
# Outputs:
#   - JSON + SARIF reports published as pipeline artifacts
# ============================================================================

parameters:
  - name: severity
    type: string
    default: 'CRITICAL,HIGH'
  - name: exitCode
    type: string
    default: '0'
  - name: poolName
    type: string
    default: ''
  - name: targetPath
    type: string
    default: '.'

jobs:
  # --------------------------------------------------------------------------
  # Secret scan job
  # --------------------------------------------------------------------------
  - job: TrivySecretScan
    displayName: 'Security - Secret Scan'
    timeoutInMinutes: 15
    pool:
      name: ${{ parameters.poolName }}
    steps:
      - checkout: self

      - template: ../steps/trivy-scan.yaml
        parameters:
          scanType: 'fs'
          targetPath: ${{ parameters.targetPath }}
          severity: ${{ parameters.severity }}
          exitCode: '1'                 # secrets usually should fail


  # --------------------------------------------------------------------------
  # SAST (Static Application Security Testing) Job
  # --------------------------------------------------------------------------
  # Scans configuration and IaC files for security misconfigurations
  # Includes Dockerfile, Kubernetes manifests, Terraform, Helm, etc.
  # Runs independently for parallel execution
  # --------------------------------------------------------------------------
  - job: TrivySASTScan
    displayName: 'Security - SAST Scan'
    timeoutInMinutes: 15
    dependsOn: []   # Explicitly parallel
    steps:
      - checkout: self
        displayName: 'Checkout source code'

      - template: ../steps/trivy-scan.yaml
        parameters:
          scanType: 'config'
          targetPath: ${{ parameters.targetPath }}
          severity: ${{ parameters.severity }}
          exitCode: ${{ parameters.exitCode }}
